title: "Practitioners Playbook Knowledge Check"
description: "Test your understanding of AI-empowered problem solving — from problem statements and opportunity synthesis through prioritization frameworks."
questions:
  - id: "m2-q1"
    type: "multiple-choice-single"
    question: "Which of the following is a proper Problem Statement rather than a solution statement?"
    options:
      - id: "a"
        text: "We need to implement a new CRM system"
      - id: "b"
        text: "Customer wait times exceed industry benchmarks by 40%, driving churn"
      - id: "c"
        text: "We should hire more customer service representatives"
      - id: "d"
        text: "The IT department needs to upgrade their servers"
    correct_option: "b"
    explanation: "A problem statement describes the observable gap between current state and desired state without prescribing a solution. Option B quantifies the gap and its impact."
    lesson_link: "03-problem-statement"
    lesson_link_label: "Review: Problem Statement"

  - id: "m2-q2"
    type: "multiple-choice-multi"
    question: "Which of the following are elements of a well-crafted Problem Statement? (Select all that apply)"
    options:
      - id: "a"
        text: "Description of the problem"
      - id: "b"
        text: "Proposed solution"
      - id: "c"
        text: "Success Measures"
      - id: "d"
        text: "Decision Makers"
      - id: "e"
        text: "Implementation timeline"
    correct_options:
      - "a"
      - "c"
      - "d"
    explanation: "The 7 elements of a Problem Statement are: Description, Customers, Decision Makers, Decision Drivers, Boundaries, Success Measures, and Timeframe. 'Proposed solution' and 'Implementation timeline' are not part of the framework."
    lesson_link: "03-problem-statement"
    lesson_link_label: "Review: Problem Statement"

  - id: "m2-q3"
    type: "matching"
    question: "Match each prompt framework component with its description:"
    pairs:
      - id: "context"
        left: "Context"
        right: "Background information and relevant data"
      - id: "task"
        left: "Task"
        right: "Specific analytical action to perform"
      - id: "output"
        left: "Output"
        right: "Desired format and detail level of results"
    explanation: "The Context + Task + Output framework structures AI analysis prompts: Context provides background, Task defines the specific action, and Output specifies the desired format."
    lesson_link: "07-curiosity-enabled-analysis"
    lesson_link_label: "Review: Curiosity-Enabled Analysis"

  - id: "m2-q4"
    type: "true-false"
    question: "In this methodology, you should pre-plan your entire analysis sequence before beginning any data exploration."
    correct_answer: false
    explanation: "False. The AI-Enabled Problem Solving approach recommends starting with a broad question, interpreting the results, and letting curiosity guide the next question. AI makes this exploratory, non-linear approach optimal."
    lesson_link: "07-curiosity-enabled-analysis"
    lesson_link_label: "Review: Curiosity-Enabled Analysis"

  - id: "m2-q5"
    type: "drag-to-rank"
    question: "Rank the phases of AI-empowered problem solving in the correct order:"
    items:
      - id: "diagnosis"
        text: "Diagnosis & Problem Framing"
      - id: "data"
        text: "Data Collection & Ingestion"
      - id: "analysis"
        text: "Analysis & Visualization"
      - id: "synthesis"
        text: "Opportunity Synthesis"
    correct_order:
      - "diagnosis"
      - "data"
      - "analysis"
      - "synthesis"
    explanation: "The diagnostic process flows from framing the problem, to collecting data, to analyzing and visualizing patterns, and finally synthesizing findings into actionable opportunities."
    lesson_link: "02-phase1-diagnosis-overview"
    lesson_link_label: "Review: Phase 1: Iterative Diagnosis"

  - id: "m2-q6"
    type: "fill-in-blank"
    question: "Complete the sentence about curiosity-enabled analysis."
    word_bank:
      - "curiosity"
      - "zero"
      - "efficiency"
      - "budget"
    segments:
      - type: "text"
        value: "With AI, the marginal cost of asking one more question is nearly "
      - type: "blank"
        value: "zero"
        accept:
          - "zero"
          - "0"
          - "nothing"
      - type: "text"
        value: ", enabling analysis driven by genuine "
      - type: "blank"
        value: "curiosity"
        accept:
          - "curiosity"
      - type: "text"
        value: " rather than budget constraints."
    explanation: "One of AI's most transformative aspects is removing the cost barrier to curiosity, enabling practitioners to explore as many analytical questions as they want."
    lesson_link: "07-curiosity-enabled-analysis"
    lesson_link_label: "Review: Curiosity-Enabled Analysis"

  - id: "m2-q7"
    type: "multiple-choice-single"
    question: "What does WSJF stand for?"
    options:
      - id: "a"
        text: "Weighted Scoring of Job Features"
      - id: "b"
        text: "Weighted Shortest Job First"
      - id: "c"
        text: "Work Sequence for Job Fulfillment"
      - id: "d"
        text: "Weighted Strategy for Joint Feasibility"
    correct_option: "b"
    explanation: "WSJF stands for Weighted Shortest Job First, a prioritization method that calculates the cost of delay divided by job duration to rank opportunities."
    lesson_link: "03-wsjf-scoring-method"
    lesson_link_label: "Review: WSJF Scoring Method"

  - id: "m2-q8"
    type: "true-false"
    question: "In the Value vs. Complexity Matrix, opportunities in the 'High Value, Low Complexity' quadrant should be prioritized first."
    correct_answer: true
    explanation: "Correct. High Value, Low Complexity opportunities (often called 'Quick Wins') deliver the most impact with the least effort and should be prioritized to build momentum and demonstrate early value."
    lesson_link: "04-value-complexity-matrix"
    lesson_link_label: "Review: Value vs. Complexity Matrix"

  - id: "m2-q9"
    type: "multiple-choice-single"
    question: "Which component is NOT part of the Cost of Delay calculation in WSJF?"
    options:
      - id: "a"
        text: "User/Business Value"
      - id: "b"
        text: "Time Criticality"
      - id: "c"
        text: "Risk Reduction / Opportunity Enablement"
      - id: "d"
        text: "Team Velocity"
    correct_option: "d"
    explanation: "Cost of Delay in WSJF is calculated from User/Business Value + Time Criticality + Risk Reduction/Opportunity Enablement. Team Velocity is not a component of Cost of Delay."
    lesson_link: "03-wsjf-scoring-method"
    lesson_link_label: "Review: WSJF Scoring Method"

  - id: "m2-q10"
    type: "matching"
    question: "Match each quadrant of the Value vs. Complexity Matrix with the recommended action:"
    pairs:
      - id: "quick-win"
        left: "High Value, Low Complexity"
        right: "Prioritize immediately (Quick Win)"
      - id: "strategic"
        left: "High Value, High Complexity"
        right: "Plan strategically with phased delivery"
      - id: "low-priority"
        left: "Low Value, Low Complexity"
        right: "Consider if resources allow"
      - id: "avoid"
        left: "Low Value, High Complexity"
        right: "Deprioritize or eliminate"
    explanation: "The matrix guides decision-making: Quick Wins first, Strategic projects with careful planning, Low Priority when resources permit, and avoid High Complexity / Low Value work."
    lesson_link: "04-value-complexity-matrix"
    lesson_link_label: "Review: Value vs. Complexity Matrix"

  - id: "m2-q11"
    type: "multiple-choice-multi"
    question: "Which of the following should be included in an Opportunity Documentation template? (Select all that apply)"
    options:
      - id: "a"
        text: "Opportunity description and quantified impact"
      - id: "b"
        text: "Supporting data and diagnostic evidence"
      - id: "c"
        text: "Detailed technical implementation plan"
      - id: "d"
        text: "Stakeholders affected and alignment status"
    correct_options:
      - "a"
      - "b"
      - "d"
    explanation: "Opportunity Documentation captures the what, why, and who — not the detailed how. Technical implementation plans come later during the tool development phase."
    lesson_link: "01-opportunity-documentation"
    lesson_link_label: "Review: Opportunity Documentation"
